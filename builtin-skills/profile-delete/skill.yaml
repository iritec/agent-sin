# Builtin: profile-delete
# soul.md / user.md / memory.md の既存エントリを削除する。

id: profile-delete
name: Profile Delete
name_i18n:
  en: Profile Delete
  ja: プロフィール削除
description: 長期プロフィールのエントリを削除する
description_i18n:
  en: Delete a long-term profile entry
  ja: 長期プロフィールのエントリを削除する
runtime: python
output_mode: raw
side_effect: true

invocation:
  command: profile.delete
  phrases:
    - プロフィールを消して
    - soul.mdから消して
    - user.mdから消して
    - memory.mdから消して
    - 長期メモを削除
  phrases_i18n:
    en:
      - delete profile
      - delete from soul.md
      - delete from user.md
      - delete from memory.md
      - delete long-term memory
    ja:
      - プロフィールを消して
      - soul.mdから消して
      - user.mdから消して
      - memory.mdから消して
      - 長期メモを削除

input:
  schema:
    type: object
    additionalProperties: false
    properties:
      target:
        type: string
        enum:
          - soul
          - user
          - memory
      index:
        type: integer
        minimum: 1
        description: 上から数えた1始まりのエントリ番号
        description_i18n:
          en: 1-based entry number counted from the top
          ja: 上から数えた1始まりのエントリ番号
      timestamp:
        type: string
        description: エントリの '## <timestamp>' ヘッダ値で特定する場合に指定
        description_i18n:
          en: Use the entry's '## <timestamp>' header value to identify it
          ja: エントリの '## <timestamp>' ヘッダ値で特定する場合に指定
    required:
      - target
